name: HermesiOS
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  HermesiOSLib:
    path: .

targets:
  HermesiOS:
    type: application
    platform: iOS
    sources:
      - path: Hermes_IOS
      - path: Hermes_IOS/Info.plist
        buildPhase: resources
      - path: Hermes_IOS/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: HermesiOSLib
        product: HermesApp
      - package: HermesiOSLib
        product: HermesWebView
      - package: HermesiOSLib
        product: HermesCapabilities
      - package: HermesiOSLib
        product: HermesUI
      - package: HermesiOSLib
        product: HermesCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(HERMES_APP_BUNDLE_IDENTIFIER)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: Hermes_IOS/Info.plist
      properties:
        CFBundleDisplayName: WebUI App
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        # Encryption export classification — we use standard TLS only (URLSession + WKWebView),
        # which is exempt under "uses or accesses only exempt cryptography." Declaring false here
        # suppresses the TestFlight encryption-classification prompt on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        # Permission strings — only what real flows actually exercise.
        NSCameraUsageDescription: "This app uses the camera to scan a QR code for webui connection setup."
        # ATS: allow non-HTTPS in WebView content for LAN dev (Tailscale magic-DNS hostnames are HTTPS).
        # Native networking is unaffected.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        # Custom URL scheme for endpoint-share fallback (hermes://agent?payload=<base64>).
        CFBundleURLTypes:
          - CFBundleURLName: com.example.HermesIOS.endpoint
            CFBundleURLSchemes:
              - hermes

  HermesiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/HermesiOSTests
    dependencies:
      - target: HermesiOS
      - package: HermesiOSLib
        product: HermesCore
      - package: HermesiOSLib
        product: HermesCapabilities
